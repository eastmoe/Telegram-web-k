name: Publish Docker image to GHCR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Docker image tag, for example v1.0.0
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-${{ github.repository }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image name and tag
        id: image
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ ! "$INPUT_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9._-]{0,127}$ ]]; then
            echo "Invalid Docker tag: $INPUT_TAG" >&2
            echo "Use 1-128 letters, digits, dots, underscores, or hyphens; the first character cannot be a dot or hyphen." >&2
            exit 1
          fi

          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "name=$image_name" >> "$GITHUB_OUTPUT"
          echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/Dockerfile_production
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write job summary
        shell: bash
        run: |
          echo "Published \`${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Published \`${{ steps.image.outputs.name }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
