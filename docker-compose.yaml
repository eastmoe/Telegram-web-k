services:
  # Legacy dependency and development containers are intentionally disabled.
  # tweb.dependencies:
  #   container_name: tweb.dependencies
  #   build:
  #     context: .
  #     dockerfile: .docker/Dockerfile_dependencies
  #   volumes:
  #     - "./node_modules:/app/node_modules"
  #   command: pnpm install

  # tweb.develop:
  #   container_name: tweb.develop
  #   build:
  #     context: .
  #     dockerfile: .docker/Dockerfile_develop
  #   volumes:
  #     - "./:/app"
  #   ports:
  #     - 8080:8080
  #   command: pnpm start-in-docker

  tweb.production:
    container_name: tweb.production
    image: "${TWEB_IMAGE:-ghcr.io/eastmoe/telegram-web-k:v0.0.1}"
    restart: unless-stopped
    ports:
      - "${TWEB_PORT:-8080}:${TWEB_PORT:-8080}"
    environment:
      HOST: "0.0.0.0"
      PORT: "${TWEB_PORT:-8080}"
      # Direct TLS can be enabled here. If TLS is terminated by a reverse
      # proxy, leave this false and proxy to the container over HTTP.
      SERVER_HTTPS_ENABLED: "${SERVER_HTTPS_ENABLED:-false}"
      SERVER_HTTPS_KEY_FILE: "${SERVER_HTTPS_KEY_FILE:-/app/certs/server-key.pem}"
      SERVER_HTTPS_CERT_FILE: "${SERVER_HTTPS_CERT_FILE:-/app/certs/server-cert.pem}"
      # Generate the hash with:
      # docker run --rm ghcr.io/eastmoe/telegram-web-k:v0.0.1 node server/hashPassword.js your-password
      HTTP_AUTH_ENABLED: "${HTTP_AUTH_ENABLED:-false}"
      HTTP_AUTH_USERNAME: "${HTTP_AUTH_USERNAME:-admin}"
      HTTP_AUTH_PASSWORD_HASH: "${HTTP_AUTH_PASSWORD_HASH:-}"
      # Set to "true" to send every Telegram HTTP/WebSocket relay connection
      # through TELEGRAM_HTTP_PROXY. When disabled, the address is ignored.
      TELEGRAM_PROXY_ENABLED: "${TELEGRAM_PROXY_ENABLED:-false}"
      # 127.0.0.1 inside the container is not the Docker host. For a proxy
      # running on the host machine, use host.docker.internal.
      TELEGRAM_HTTP_PROXY: "${TELEGRAM_HTTP_PROXY:-http://host.docker.internal:7890}"
      TELEGRAM_REQUEST_TIMEOUT_MS: "${TELEGRAM_REQUEST_TIMEOUT_MS:-30000}"
      TELEGRAM_MAX_REQUEST_BYTES: "${TELEGRAM_MAX_REQUEST_BYTES:-67108864}"
      TELEGRAM_MAX_BUFFERED_WEBSOCKET_BYTES: "${TELEGRAM_MAX_BUFFERED_WEBSOCKET_BYTES:-8388608}"
    volumes:
      # Mount a host certificate directory read-only. It may stay empty while
      # SERVER_HTTPS_ENABLED is false.
      - "${TLS_CERTS_HOST_DIR:-./certs}:/app/certs:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"
